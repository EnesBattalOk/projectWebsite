{% extends 'base.html' %}

{% block content %}
<div class="container py-5 text-center">
    <div style="padding: 100px 0;">
        <i class="fas fa-tools" style="font-size: 4rem; color: var(--accent-color); margin-bottom: 2rem;"></i>
        <h1 style="font-size: 3rem; font-weight: 800; margin-bottom: 1rem;">Oops! Server Error</h1>
        <p style="font-size: 1.25rem; color: var(--text-muted); margin-bottom: 2.5rem;">Something went wrong on our end.
            Please try again later.</p>
        <a href="{{ url_for('index') }}" class="btn btn-primary">Go Home</a>
    </div>
</div>
{% endblock %}
