{% extends 'base.html' %}

{% block content %}
<div class="container py-5 text-center">
    <div style="padding: 100px 0;">
        <i class="fas fa-exclamation-triangle"
            style="font-size: 4rem; color: var(--accent-color); margin-bottom: 2rem;"></i>
        <h1 style="font-size: 3rem; font-weight: 800; margin-bottom: 1rem;">404 - Page Not Found</h1>
        <p style="font-size: 1.25rem; color: var(--text-muted); margin-bottom: 2.5rem;">The page you are looking for
            might have been moved or deleted.</p>
        <a href="{{ url_for('index') }}" class="btn btn-primary">Go Home</a>
    </div>
</div>
{% endblock %}
